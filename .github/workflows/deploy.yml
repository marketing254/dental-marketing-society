name: Deploy to GitHub Pages

# Push to main -> the whole site builds and hosts automatically.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Inlined into the static build so the forms can post leads.
          # Set this as a repository VARIABLE (Settings → Secrets and variables
          # → Actions → Variables), named exactly NEXT_PUBLIC_DMS_APPS_SCRIPT_URL.
          NEXT_PUBLIC_DMS_APPS_SCRIPT_URL: ${{ vars.NEXT_PUBLIC_DMS_APPS_SCRIPT_URL }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
